<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>light-ray</title>
  </head>
  <body>

    <div class="section">
      <div class="container">
        <div class="tag">

          <svg
            id="scene"
            class="scene"
            viewBox="0 0 1000 1000"
            preserveAspectRatio="xMidYMid meet"
            width="100%"
            height="100%"
          >
            <!-- four frustum faces: edge 0–1, 1–2, 2–3, 3–0 -->
            <g id="light-rays" filter="url(#rayGlow)">
              <polygon id="light0" fill="url(#rayGrad0)" />
              <polygon id="light1" fill="url(#rayGrad1)" />
              <polygon id="light2" fill="url(#rayGrad2)" />
              <polygon id="light3" fill="url(#rayGrad3)" />
            </g>
          
            <!-- big square -->
            <polygon id="target" fill="transparent"/>

            <!-- Source + label: local coords; translate X is read in main.js for light-ray world points -->
            <g id="source-group" transform="translate(-235 0)">
              <polygon id="source" points="420,420 580,420 580,580 420,580" fill="#fff" />
              <text
                x="620"
                y="510"
                text-anchor="start"
                dominant-baseline="middle"
                class="text"
                fill="#fff"
              >
                Polygon
              </text>
            </g>

            <rect id="dust" x="0" y="0" width="1000" height="1000" fill="#fff" filter="url(#dustFilter)" />
          
            <defs>

              <filter
                id="dustFilter"
                x="-15%"
                y="-15%"
                width="130%"
                height="130%"
                filterUnits="objectBoundingBox"
                color-interpolation-filters="sRGB"
              >
                <!-- High baseFrequency = fine film-style grain (low values = huge soft blobs, barely visible as “noise”) -->
                <feTurbulence
                  id="noiseTurb"
                  type="fractalNoise"
                  baseFrequency="0.82 0.79"
                  numOctaves="4"
                  seed="32"
                  stitchTiles="stitch"
                  result="turb"
                />
                <feColorMatrix in="turb" type="saturate" values="0" result="mono" />
                <feComponentTransfer in="mono" result="contrast">
                  <feFuncR type="linear" slope="3.2" intercept="-0.58" />
                  <feFuncG type="linear" slope="3.2" intercept="-0.58" />
                  <feFuncB type="linear" slope="3.2" intercept="-0.58" />
                </feComponentTransfer>
                <feGaussianBlur in="contrast" stdDeviation="0.35" result="grain" />
              </filter>

              <filter
                id="rayGlow"
                x="-60%"
                y="-60%"
                width="220%"
                height="220%"
                filterUnits="objectBoundingBox"
                color-interpolation-filters="sRGB"
              >
                <feGaussianBlur in="SourceGraphic" stdDeviation="0" result="blurWide" />
                <feGaussianBlur in="SourceGraphic" stdDeviation="40" result="blurCore" />
                <feMerge>
                  <feMergeNode in="blurWide" />
                  <feMergeNode in="blurCore" />
                  <feMergeNode in="SourceGraphic" />
                </feMerge>
              </filter>
              <!-- x1,y1,x2,y2 set in JS per face: source edge → target edge (no meaningful direction until first move) -->
              <linearGradient id="rayGrad0" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="0" y2="0" spreadMethod="pad">
                <stop offset="0%" stop-color="#fff" stop-opacity="0.2"/>
                <stop offset="80%" stop-color="#fff" stop-opacity="0"/>
              </linearGradient>
              <linearGradient id="rayGrad1" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="0" y2="0" spreadMethod="pad">
                <stop offset="0%" stop-color="#fff" stop-opacity="0.2"/>
                <stop offset="80%" stop-color="#fff" stop-opacity="0"/>
              </linearGradient>
              <linearGradient id="rayGrad2" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="0" y2="0" spreadMethod="pad">
                <stop offset="0%" stop-color="#fff" stop-opacity="0.2"/>
                <stop offset="80%" stop-color="#fff" stop-opacity="0"/>
              </linearGradient>
              <linearGradient id="rayGrad3" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="0" y2="0" spreadMethod="pad">
                <stop offset="0%" stop-color="#fff" stop-opacity="0.2"/>
                <stop offset="80%" stop-color="#fff" stop-opacity="0"/>
              </linearGradient>
            </defs>
          </svg>

        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
